<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Hokuriku JETs</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/admin.css" />

  <style>
    /* Page-local layout only — everything else (.stack, .btn, .form-error,
       inputs) reuses admin.css's existing modal/form styling so this page
       reads as part of the same site rather than a one-off. */
    .reset-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-5);
    }
    .reset-card {
      background: var(--paper);
      border: 1.5px solid var(--mist);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: var(--space-6);
      width: min(420px, 100%);
    }
    .reset-card h1 {
      font-size: 1.3rem;
      margin-bottom: var(--space-2);
    }
    .reset-card__subtitle {
      color: var(--ink-soft);
      font-size: 0.9rem;
      margin: 0 0 var(--space-5) 0;
    }
    .reset-success {
      color: var(--moss-deep);
      background: var(--moss-tint);
      font-size: 0.9rem;
      padding: var(--space-3);
      border-radius: var(--radius-sm);
    }
  </style>
</head>
<body>

  <main class="reset-page">
    <div class="reset-card" id="reset-card">
      <!-- Filled in by reset-password.js below depending on link state -->
      <h1>Loading&hellip;</h1>
      <p class="reset-card__subtitle">Checking your reset link.</p>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script>
    // ------------------------------------------------------------------
    // Standalone — deliberately doesn't load supabase-client.js/ui-helpers.js,
    // since this page only needs auth.updateUser and a couple of small DOM
    // helpers, and must keep working even if a recovery link arrives with
    // no other app state loaded.
    // ------------------------------------------------------------------
    const supabaseClient = window.supabase.createClient(
      CONFIG.SUPABASE_URL,
      CONFIG.SUPABASE_ANON_KEY
    );

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str ?? '';
      return div.innerHTML;
    }

    const cardEl = document.getElementById('reset-card');

    function renderForm() {
      cardEl.innerHTML = `
        <h1>Set a new password</h1>
        <p class="reset-card__subtitle">Choose a new password for your account.</p>
        <form id="form-reset" class="stack">
          <label>New password <input type="password" name="password" minlength="8" required autocomplete="new-password" /></label>
          <label>Confirm password <input type="password" name="confirmPassword" minlength="8" required autocomplete="new-password" /></label>
          <p class="form-error" id="reset-error" hidden></p>
          <button type="submit" class="btn btn--accent btn--block">Update password</button>
        </form>
      `;

      document.getElementById('form-reset').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const password = fd.get('password');
        const confirmPassword = fd.get('confirmPassword');
        const errEl = document.getElementById('reset-error');
        errEl.hidden = true;

        if (password !== confirmPassword) {
          errEl.textContent = "Passwords don't match.";
          errEl.hidden = false;
          return;
        }

        const submitBtn = e.target.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Updating…';

        try {
          const { error } = await supabaseClient.auth.updateUser({ password });
          if (error) throw error;
          renderSuccess();
        } catch (err) {
          errEl.textContent = err.message || 'Something went wrong. Please try again.';
          errEl.hidden = false;
          submitBtn.disabled = false;
          submitBtn.textContent = 'Update password';
        }
      });
    }

    function renderSuccess() {
      cardEl.innerHTML = `
        <h1>Password updated</h1>
        <p class="reset-success">Your password has been changed. You can now sign in with your new password.</p>
      `;
    }

    function renderExpired() {
      cardEl.innerHTML = `
        <h1>Link expired or invalid</h1>
        <p class="reset-card__subtitle">
          This password reset link is no longer valid — recovery links expire after a
          set time, and can only be used once. Request a new one from the sign-in form.
        </p>
      `;
    }

    function renderError(message) {
      cardEl.innerHTML = `
        <h1>Something went wrong</h1>
        <p class="form-error">${escapeHtml(message)}</p>
      `;
    }

    // ------------------------------------------------------------------
    // Supabase's recovery link can land here in one of two shapes
    // depending on the project's auth flow setting:
    //   - implicit flow:  #access_token=...&type=recovery  (hash fragment)
    //   - PKCE flow:      ?code=...                          (query param)
    // We don't assume which one is configured — check for a PKCE `code`
    // first, otherwise fall back to letting supabase-js parse the hash
    // itself via detectSessionInUrl (on by default) and listening for the
    // PASSWORD_RECOVERY auth event it fires once that parse completes.
    // ------------------------------------------------------------------
    async function init() {
      const url = new URL(window.location.href);
      const code = url.searchParams.get('code');

      if (code) {
        const { error } = await supabaseClient.auth.exchangeCodeForSession(code);
        if (error) {
          renderExpired();
          return;
        }
        renderForm();
        return;
      }

      // No ?code — check whether a hash-based recovery session is already
      // present (supabase-js auto-parses the URL hash on client creation).
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        renderForm();
        return;
      }

      // Session not ready yet — give detectSessionInUrl a moment to finish
      // parsing the hash and fire PASSWORD_RECOVERY, with a timeout so the
      // page doesn't hang forever on a genuinely broken/expired link.
      let settled = false;
      const { data: listener } = supabaseClient.auth.onAuthStateChange((event, session) => {
        if (settled) return;
        if (event === 'PASSWORD_RECOVERY' && session) {
          settled = true;
          listener.subscription.unsubscribe();
          renderForm();
        }
      });

      setTimeout(() => {
        if (settled) return;
        settled = true;
        listener.subscription.unsubscribe();
        renderExpired();
      }, 4000);
    }

    init().catch((err) => renderError(err.message || 'Unexpected error.'));
  </script>

</body>
</html>
